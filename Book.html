<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Tracker</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav>
            <a href="#">Home</a>
            <a href="#">Logged Books</a>
        </nav>
    </header>

    <section id="book-form">
        <form>
            <label>Title:</label>
            <input id="book-title" name="book-name" placeholder="Book Title" />
            
            <label>Author:</label>
            <input id="book-author" name="author" placeholder="Book Author"/>

            <label>Year</label>
            <input  type="number" id="book-year" name="book-year" placeholder="Book Year"/>

            <label>Genre</label>
            <select id="select-genre" placeholder="Select Genre">
                <option value="">Select Genre</option>
                <option value="non-fiction">Non-Fiction</option>
                <option value="fiction">Fiction</option>
                <option value="mystery">Mystery</option>
                <option value="science-fiction">Science Fiction</option>
                <option value="fantasy">Fantasy</option>
                <option value="history">History</option>
                <option value="romance">Romance</option>
                <option value="thriller">Thriller</option>
                <option value="biography">Biography</option>
                <option value="self-help">Self Help</option>
            </select>
            <button type="button" id="add-book">Add Book</button>
        </form>
        <p id="total-books">Total Books Logged:</p>
    </section>

    <section id="book-filter">
        <select id="select-filter" placeholder="Select Filter">
                <option value="">Select Genre</option>
                <option value="non-fiction">Non-Fiction</option>
                <option value="fiction">Fiction</option>
                <option value="mystery">Mystery</option>
                <option value="science-fiction">Science Fiction</option>
                <option value="fantasy">Fantasy</option>
                <option value="history">History</option>
                <option value="romance">Romance</option>
                <option value="thriller">Thriller</option>
                <option value="biography">Biography</option>
                <option value="self-help">Self Help</option>
        </select>
        <button type="button" id="filter-button">Filter</button>
    </section>

    <section class="book-log"></section>
    <script src="js/app.js"></script>

</body>

</html>
