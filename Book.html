<!doctype html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Tracker</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header>
      <nav class="navbar">
        <a href="#">Home </a>
        <a href="#">Logged Books</a>
      </nav>
    </header>

    <section id="book-form">
      <h2 id="log-book">Log Book</h2>
      <form id="form">
        <label>Title:</label>
        <input id="book-title" name="book-name" placeholder="Book Title" />

        <br />

        <label>Author:</label>
        <input id="book-author" name="author" placeholder="Book Author" />

        <br />

        <label>Year:</label>
        <input
          type="number"
          id="book-year"
          name="book-year"
          placeholder="Book Year"
        />

        <br />

        <label>Genre:</label>
        <select id="select-genre" placeholder="Select Genre">
          <option value="">Select Genre</option>
          <option value="non-fiction">Non-Fiction</option>
          <option value="fiction">Fiction</option>
          <option value="mystery">Mystery</option>
          <option value="science-fiction">Science Fiction</option>
          <option value="fantasy">Fantasy</option>
          <option value="history">History</option>
          <option value="romance">Romance</option>
          <option value="thriller">Thriller</option>
          <option value="biography">Biography</option>
          <option value="self-help">Self Help</option>
        </select>
        <br />
        <br />
        <br />
        <button type="button" id="add-book">Add Book</button>
      </form>
    </section>

    <p id="total-books">Total Books Logged:</p>
    <br />
